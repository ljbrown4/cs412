{% extends 'project/base.html' %}

{% block content %}
<main class="container">
    <br>
    <section class="white-card" style="padding: 24px; max-width: 600px; margin: 0 auto;">

    <h2 style="margin-bottom: 10px; text-align: center;">Delete Media</h2>

    <p style="margin-bottom: 16px; color: #6f6a67; text-align: center;">Are you sure you want to delete this media? This action cannot be undone.</p>

        <img class="media-large" style="max-height: 400px;"src="{{ media.media.url }}">

    <br>
    <br>
    {% if media.caption %}
        <h3>{{ media.caption }}</h3>
    {% endif %}
 

    <br>

    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; gap: 12px;">
            <a class="toolbar-button" href="{{ back_url }}">Cancel</a>
            <button class="toolbar-button" style="background: #7d1e1a; color: white;">
                Delete Media
            </button>
        </div>
    </form>

</section>
</main>
{% endblock %}
