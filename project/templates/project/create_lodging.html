{% extends 'project/base.html' %}

{% block content%}
<main class="container">
    <br>
    <div style="display: flex; justify-content: center;">
        <div class="log-card" style="align-items: center; width: 100%; max-width: 700px;">
            <h3 style="text-align: center;"> Create Lodging</h3>
            <br>
            <form class="login-form" action="{% url 'create_lodging' destination.pk %}" method="POST" enctype="multipart/form-data"> <!--- this is for image upload-->  
                {%csrf_token%}
                
                {{form.as_table}}
                <input class="login-button" type="submit" value="Create Lodging">
            </form>
            <form action="{% url 'destination' destination.pk %}" style="width: 100px;" method='GET'>
                <input class="login-button" id="cancel" type="submit" value="Cancel">
            </form>
        </div>
    </div>
</main>
{% endblock %}
