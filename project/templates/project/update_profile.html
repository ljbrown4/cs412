{% extends 'project/base.html' %}

{% block content%}
<main class="container" style="align-items: center; align-content: center;">
    <br>      
    <div class="log-card" style="align-items: center; align-content: center; width: 100%; max-width: 700px;">
        <h3 style="text-align: center;"> Update Profile</h3>
        <br>
        <form class="login-form" action="{% url 'update_profile' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;">
                {% if profile.profile_image %}
                <div style="margin-bottom: 16px;">
                    <p><b>Current profile image:</b></p>
                    <img src="{{ profile.profile_image.url }}" style="width: 100%; max-width: 260px; border-radius: 14px;">
                </div>
            {% endif %}

            {% if profile.cover_image %}
                <div style="margin-bottom: 16px;">
                    <p><b>Current cover image:</b></p>
                    <img src="{{ profile.cover_image.url }}" style="width: 100%; max-width: 260px; border-radius: 14px;">
                </div>
            {% endif %}
            </div>

            {{ form.as_p }}
            <input class="login-button" type="submit" value="Update Profile">
        </form>
        <form action="{% url 'profile' %}" style="width: 100px;" method='GET'>
            <input class="login-button" id="cancel" type="submit" value="Cancel">
        </form>
    </div>
</main>
{% endblock %}
