{% extends 'mini_insta/base.html' %}

{% block content%}
<main class="container">

    <form action="{% url 'create_profile' %}" method="POST" > 
        {% csrf_token %}
        <h3 style="text-align: center;">Please Fill Out Both Forms</h3>
        <div class="form">
            <div class="double3">
                <div>
                    <h3 style="text-align: center;">Create User</h3>
                    <table>{{user.as_table}}</table>
                    
                    <form action="{% url 'show_all_profiles' %}" method='GET'>
                        <input id="cancel" type="submit" value="Cancel">
                    </form>
                </div>
            
                <div>
                    <h3 style="text-align: center;">Create Profile</h3>
                    <table>{{form.as_table}}</table>
                    <input class="submit-btn" type="submit" name="submit" value="Create">
                </div>

            </div>
        </div>
    </form>
    
</main>
{% endblock %}
