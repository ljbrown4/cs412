{% extends 'dadjokes/base.html' %}

{% block content %}
<div class="container">
    <h3 style="text-align: center;">All Jokes</h3>

    {% if jokes %}
        {% for joke in jokes %}
            <div class="feed-profile">
                <h3>
                    <a href="{% url 'joke' joke.pk %}">{{ joke.joke }}</a>
                </h3>
                <h5>By {{ joke.contributor }}</h5>
                <p>{{ joke.timestamp }}</p>
            </div>
        {% endfor %}
    {% else %}
        <div class="noposts">
            <h3>No jokes yet.</h3>
        </div>
    {% endif %}
</div>
{% endblock %}
